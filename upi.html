<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Page</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: #321239;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      flex-direction: column;
    }

    .logo-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    .logo-container img {
      height: 80px;
    }

    .pay-button {
      background-color: #ffffff;
      color: #321239;
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 30px;
      font-weight: bold;
    }

    .pay-button:hover {
      opacity: 0.9;
    }

    .qr-section {
      margin-top: 20px;
    }

    .qr-section img {
      width: 250px;
      height: 250px;
      margin-top: 15px;
    }

    .contact {
      margin-top: 30px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <!-- Logos -->
  <div class="logo-container">
    <img src="images/lwks-logo.png" alt="LWKS Logo">
    <img src="images/ph-logo.png" alt="PH Logo">
  </div>

  <!-- Pay Button -->
  <a href="upi://pay?cu=INR&pa=0799532A0264167.bqr@kotak" class="pay-button" target="_blank">
    CLICK TO PAY
  </a>

  <!-- QR Code Section -->
  <div class="qr-section">
    <p><strong>OR SCAN TO PAY</strong></p>
    <img src="images/qr-code.png" alt="QR Code">
  </div>

  <!-- Contact Info -->
  <div class="contact">
    In case of any issues contact<br>
    7578039696, 7002416110
  </div>

</body>
</html>
